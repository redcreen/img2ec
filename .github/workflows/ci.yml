name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest (pure infra only — codex/rembg/网络 skip)
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          pytest tests/test_infra -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: typecheck
        run: npx tsc --noEmit
      - name: vitest
        run: npm test
      - name: lint
        run: npm run lint
